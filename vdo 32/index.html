<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Design in Css</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="card">
        <div class="image"><img width="188px" src="image.jpg" alt=""></div>

        <div class="capsules">
            <span>Nature</span>
            <span>Travel</span>
        </div>
        <div class="content">
            <h2>Suman</h2>
            <p>Lorem ipsum, dolor sit amet consectetur adipisicing elit. Voluptate alias ipsa dolorem, molestiae sit
                reiciendis rem laudantium temporibus blanditiis eligendi nostrum quod magnam atque aliquid.</p>
            <div class="button">
                <button>Read More</button>
            </div>
        </div>
    </div>
</body>

</html>
