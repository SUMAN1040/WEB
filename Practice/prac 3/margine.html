<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #p1 {
            border: 2px solid purple;
        }

        #p2 {
            margin: 12px 95px 23px 50px;
            border: 2px solid red;
        }
    </style>
</head>

<body>
    <!-- The margine is the space outside and Html element. It provides external spacing and helps to separate two or more
    elements from each other. -->
    <p id="p1">CodeWithHarry (without margin)</p>
    <p id="p2">CodeWithHarry (with margin)</p>
</body>

</html>
