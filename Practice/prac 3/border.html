<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .none {
            border-style: none;
            border-width: 10px;
            border-radius: 10px;
        }

        .hidden {
            border-style: hidden;
            border-width: 10px;
            border-radius: 10px;
            border-radius: 10px;
        }

        .dotted {
            border-style: dotted;
            border-width: 10px;
            border-radius: 10px;
        }

        .dashed {
            border-style: dashed;
            border-width: 10px;
            border-radius: 10px;
        }

        .solid {
            border-style: solid;
            border-width: 10px;
            /* border-radius: 10px; */
            border-radius: 100px 5px 15px 35px;
            border-collapse: collapse;
            border-spacing: 10px;
        }

        .double {
            border-style: double;
            border-width: 10px;
            border-radius: 10px;
        }

        .groove {
            border-style: groove;
            border-width: 10px;
            border-radius: 10px;
        }

        .ridge {
            border-style: ridge;
            border-width: 10px;
            border-radius: 10px;
        }

        .inset {
            border-style: inset;
            border-width: 10px;
            border-radius: 10px;
        }

        .outset {
            border-style: outset;
            border-width: 10px;
            border-radius: 10px;
        }
    </style>
    <style>
        .dotted {
            border-style: dotted;
            border-color: purple;
            border-width: 10px;
        }

        .dashed {
            border-style: dashed;
            border-color: #FF0000;
            border-width: 10px;
            border-width: 10px;
        }

        .solid {
            border-style: solid;
            border-color: rgb(100, 233, 12);
            border-width: 10px;
        }

        .double {
            border-style: double;
            border-color: hsl(10, 50, 30);
            border-width: 10px;
        }
    </style>
    <style>
        p:last-child {
            border: 2px solid red;
        }
    </style>
</head>

<body>
    <p class="none">no border</p>
    <p class="hidden">Hidden Border</p>
    <p class="dotted">Dotted Border</p>
    <p class="dashed">Dashed Border</p>
    <p class="solid">Solid border</p>
    <p class="double">Double Border</p>
    <p class="groove">Groove border</p>
    <p class="ridge">ridge border</p>
    <p class="inset">inset border</p>
    <p class="outset">Outset Border</p>
    <p>Hello world, I'm CodeWithHarry</p>
</body>

</html>
