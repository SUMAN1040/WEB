<!DOCTYPE html>
<html>
  <head>
    <title>CSS clamp() Example</title>
    <style>
      .text {
        font-size: clamp(16px, 2vw, 32px);
        /* At least 16px, ideally 2% of viewport width, but max 32px */
        color: darkblue;
      }
    </style>
  </head>
  <body>
    <h2>CSS clamp() Function</h2>
    <p class="text">This text size adjusts based on screen width.</p>
  </body>
</html>
