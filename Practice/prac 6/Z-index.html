<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .container {
        position: relative;
      }

      .box1-box {
        position: relative;
        z-index: 1;
        border: 2px solid black;
        height: 100px;
        margin: 40px;
        background-color: aqua;
      }

      .box2-box {
        position: absolute;
        z-index: 3;
        background-color: rosybrown;
        height: 60px;
        width: 70%;
        left: 250px;
        top: 50px;
        border: 2px solid red;
      }

      .box3-box {
        position: absolute;
        color: wheat;
        z-index: 2;
        background-color: rebeccapurple;
        width: 45%;
        left: 270px;
        top: 15px;
        height: 100px;
        border: 2px solid rgb(141, 252, 141);
      }
    </style>
  </head>
  <body>
    <!-- When there are multiple overlapping elements, the z-index helps in deciding the order of their visibility. The element with higher z-index is displayed in front of the element with lower z-index. -->
    <h1>CSS z-index</h1>

    <div class="container">
      <div class="box1-box">Box 1 (z-index: 1)</div>
      <div class="box2-box">Box 2 (z-index: 3)</div>
      <div class="box3-box">Box 3 (z-index: 2)</div>
    </div>
  </body>
</html>
