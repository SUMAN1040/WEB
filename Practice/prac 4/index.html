<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS hover and cursor</title>
    <style>
      h1 {
        font-size: 20px;
        color: royalblue;
      }

      a:link {
        color: red;
      }

      a:visited {
        color: green;
      }

      a:hover {
        color: hotpink;
      }
    </style>
    <style>
        #p1 {
            color: yellow;
        }
        #p1:hover {
            color: red;
        }
 
        #p2 {
            border: 2px solid red;
        }
        #p2:hover {
            border: 5px solid purple;
        }
    </style>
  </head>

  <body>
    <h1>CSS tutorials with CodeWithHarry</h1>
    <a href="https://www.codewithharry.com/" target="_blank"
      >Code with Harry website</a
    >

    <p id="p1">CodeWithHarry</p>
    <p id="p2">Developer and Founder of CodeWithHarry.com</p>
  </body>
</html>
