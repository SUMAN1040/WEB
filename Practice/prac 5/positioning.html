<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Positioning</title>
  <style>
    .tag {
      position: relative;
      padding: 40px;
      height: 200px;
      border: 2px solid black;
    }

    video {
      position: absolute;
      right: 10px;
      top: 10px;
      width: 80px;
      cursor: pointer;
    }

    h1 {
      position: sticky;
      top: 0px;
      background: yellow;
    }
  </style>
</head>

<body>
  <!-- The CSS postioning property allows you to control how and where elements are
    placed on a web page. Its defines whether an element should follow the
    natural flow of the document or be positioned at a specific spot using
    coordinates like top, right,  bottom, and left; -->
