<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Video</title>

    <style>
      body {
        display: flex;
        gap: 20px;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }

      video {
        width: 500px;
        height: 200px;
        border: 1px solid gray;
      }
      #asd {
        background-color: royalblue;
        color: white;
        padding: 10px 20px;
        border: none;
        border-radius: 5px;
        font-size: 16px;
        cursor: pointer;
      }
      /* button:hover {
        background-color: darkblue;
      } */
      #asd:active {
        background-color: navy;
      }

      #asd:focus {
        outline: 2px solid orange;
      }
    </style>
    <style>
      .button1 {
        background-color: #3300ff;
        color: white;
        padding: 15px 32px;
        text-align: center;
        text-decoration: none;
        display: inline-block;
        font-size: 16px;
        margin: 4px 2px;
        cursor: pointer;
      }

      .button2 {
        box-shadow: 5px 5px yellowgreen;
        margin: 10px;
      }

      .button3 {
        padding: 10px;
        background-color: white;
        border: 1px solid red;
        border-radius: 10px;
      }
    </style>
    
  </head>
  <body>
    <video controls>
      <source src="1.mp4" type="video/mp4" />
    </video>
    <button id="asd">Click Me</button>
    <h1 style="color: #3300ff">CSS Buttons</h1>
    <button>Default Button</button>
    <a href="#" class="button1">Link Button</a>
    <button class="button2">Shadow on Button</button>
    <button class="button3">Border on Button</button>
  </body>
</html>
