<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS cals() Examples</title>
    <style>
      .container {
        width: 100%;
        background: lightgray;
        padding: 10px;
      }
      .box {
        width: calc(100% - 40px); /* 100% width minus 40px */
        height: 100px;
        background: lightblue;
        border: 2px solid navy;
      }
    </style>
  </head>
  <body>
    <h2>CSS calc() Function</h2>
    <div class="container">
      <div class="box">Width = 100% - 40px</div>
    </div>
  </body>
</html>
