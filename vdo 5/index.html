<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Images</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <thead>Header</thead>
    <br>
    <img width="500" height="300" src="image.png" alt="Train Image">
    <table>
        <caption>Table</caption>
        <thead>
            <tr>
                <th>name</th>
                <th>age</th>
                <th>gender</th>
        </thead>
        <tbody>
            <tr>
                <td>suman</td>
                <td>22</td>
                <td>male</td>
            </tr>
            <tr>
                <td colspan="2">xyz</td>
                <td rowspan="2">22</td>
            </tr>
            <tr>
                <td colspan="2">xyz</td>
            </tr>
        </tbody>
    </table>
    <tfoot>Footer</tfoot>


    <ul type="square">
        <li>SUMAN</li>
        <li>KUMAR</li>
        <li>DEY</li>
    </ul>
    <ol type="A">
        <li>SUMAN</li>
        <li>KUMAR</li>
        <li>DEY</li>
    </ol>

    <dl>
        <h1>Info</h1>
        <dt>Suman</dt>
        <dd>22</dd>

        <dt>Kumar</dt>
        <dd>22</dd>

        <dt>Dey</dt>
        <dd>22</dd>
    </dl>
</body>

</html>
